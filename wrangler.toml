name = "registrai-agents"
main = "src/worker.ts"
compatibility_date = "2026-05-01"
compatibility_flags = ["nodejs_compat"]

# Cron triggers. Add one per agent. The dispatch in src/worker.ts maps each
# cron expression to its agent.
[triggers]
crons = [
  "0 14 * * *",   # warsaw-resi attestation, daily 14:00 UTC
  "0 */6 * * *",  # market proposer (LLM), every 6 hours
  "*/15 * * * *", # market-maker bot, every 15 minutes
]

[[kv_namespaces]]
binding = "PROPOSALS"
id = "f084e51e62ed4ca9947ec5ef508da6cd"

# Public (non-secret) bindings — contract addresses, feed ids, methodology CIDs.
# Secrets (PRIVATE_KEY, RPC_URL, NBP_REPORT_URL) are set via:
#   wrangler secret put PRIVATE_KEY
[vars]
REGISTRY_ADDRESS = "0xA8E6f5aC6410231Db1422f3B17987Cf657807224"
ATTESTATION_ADDRESS = "0x04227E2e53041165CB38D5C0aFadCC95096ae5f4"
WARSAW_FEED_ID = "0xf4968db834c4e03f9c2e10bb883fe74f84c850cfacac058a1b520a8d8fa37c0b"
WARSAW_AGENT_ADDRESS = "0x84C799941C6B69AbB296EC46a02E4e0772Ad2E5e"
WARSAW_METHODOLOGY_CID = "ipfs://warsaw-resi-v1-placeholder"
WARSAW_OTODOM_URL = "https://www.otodom.pl/pl/wyniki/sprzedaz/mieszkanie/mazowieckie/warszawa/warszawa/warszawa"

# Polish CPI agent
POLISH_CPI_FEED_ID = "0x82f8fdde492becda94f8fa721adf86a7b843786875889b428197afb17a4e84f4"
POLISH_CPI_METHODOLOGY_CID = "ipfs://polish-cpi-v1-placeholder"

# ECB main refi rate agent
ECB_RATE_FEED_ID = "0xf2cc4c84c9ee4b2caeb72c77b9c9d4576da152ab8ccdbc02dedc0e611d3cf0bd"
ECB_RATE_METHODOLOGY_CID = "ipfs://ecb-rate-v1-placeholder"
